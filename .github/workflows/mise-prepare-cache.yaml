name: Mise - prepare cache
on:
  workflow_call:
    inputs:
      runner:
        description: Runner to use
        required: true
        type: string
  workflow_dispatch:
    inputs:
      runner:
        default: ubuntu-24.04
        description: Runner to use
        required: true
        type: string
permissions:
  contents: read

jobs:
  prepare-cache:
    name: Prepare Mise cache
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Prepare cache
        uses: ./.github/actions/mise-project-setup
        with:
          cache-mode: prepare
          directory: ""
