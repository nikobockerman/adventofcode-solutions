name: Hardened libc++ with iterator bounds checks
description: Build and cache a custom libc++ with iterator bounds checks enabled

inputs:
  llvm-major-version:
    description: "Major version of Homebrew LLVM used as compiler and cmake provider"
    required: true

outputs:
  install-dir:
    description: "Path to the installed hardened libc++"
    value: ${{ steps.init.outputs.installDir }}

runs:
  using: composite
  steps:
    - id: init

      env:
        # renovate: datasource=github-releases depName=llvm packageName=llvm/llvm-project extractVersion=^llvmorg-(?<version>.*)$
        LLVM_VERSION: 22.1.8
      run: |
        # Initialize hardened libc++ action
        "${GITHUB_ACTION_PATH}/init.sh"
      shell: bash

    - id: cache-restore
      name: Restore cached hardened llvm libc++
      uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        key: llvm-libc++-hardened-${{ steps.init.outputs.llvmVersion }}-homebrew-llvm@${{ inputs.llvm-major-version }}-${{ hashFiles('.github/actions/hardened-libc++/build.sh') }}
        path: ${{ steps.init.outputs.installDir }}

    - id: checkout-llvm
      name: Checkout LLVM project
      if: steps.cache-restore.outputs.cache-hit != 'true'
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        repository: llvm/llvm-project
        ref: llvmorg-${{ steps.init.outputs.llvmVersion }}
        fetch-depth: 1
        path: repo-llvm-project

    - id: build
      name: Build hardened libc++
      if: steps.cache-restore.outputs.cache-hit != 'true'
      env:
        INSTALL_DIR: ${{ steps.init.outputs.installDir }}
        LLVM_VERSION: ${{ steps.init.outputs.llvmVersion }}
        LLVM_PROJECT_DIR: ${{ github.workspace }}/repo-llvm-project
        LLVM_MAJOR_VERSION: ${{ inputs.llvm-major-version }}
      run: |
        # Build hardened llvm libc++
        "${GITHUB_ACTION_PATH}/build.sh"
      shell: bash

    - if: steps.cache-restore.outputs.cache-hit != 'true'
      name: Save hardened llvm libc++ cache
      uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
      with:
        key: ${{ steps.cache-restore.outputs.cache-primary-key }}
        path: ${{ steps.init.outputs.installDir }}
